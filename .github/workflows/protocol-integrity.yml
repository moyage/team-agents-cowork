name: Protocol Integrity Guard

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  verify-integrity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run Anti-Tamper Check
        run: |
          python3 scripts/verify_integrity.py
          
      - name: Upload Integrity Result (Machine-Readable)
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: integrity-result
          path: ci/integrity-result.json
          retention-days: 7
