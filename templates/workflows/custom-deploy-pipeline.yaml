id: custom-deploy-pipeline
description: "Custom workflow for staging deployment with QA verification."
use_when: "The user wants to deploy a specific feature branch to the staging environment and request QA sign-off."
nodes:
  - id: analyze_deployment_risk
    type: ai_execution
    description: "Analyze the target feature branch for potential deployment risks or missing environment variables."
    depends_on: []
  - id: build_project
    type: bash
    command: "npm run build"
    depends_on: ["analyze_deployment_risk"]
  - id: deploy_to_staging
    type: bash
    command: "aws s3 sync ./dist s3://staging-bucket --delete"
    depends_on: ["build_project"]
  - id: qa_sign_off
    type: ai_execution
    description: "Perform an automated QA pass on the deployed staging environment URL."
    is_isolated_reviewer: true
    depends_on: ["deploy_to_staging"]
